<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Boulder Dash — Hyper Animated Mobile Game" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <title>Boulder Dash</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }
    #game-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #ui-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 10;
    }
    #ui-overlay > * { pointer-events: auto; }
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      padding-top: max(8px, env(safe-area-inset-top));
      background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      z-index: 20;
    }
    .hud-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .hud-icon { font-size: 18px; }
    .hud-value { font-variant-numeric: tabular-nums; }
    #dpad-container {
      position: absolute;
      bottom: 20px;
      left: 20px;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 30;
    }
    #action-container {
      position: absolute;
      bottom: 40px;
      right: 20px;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 30;
    }
    #menu-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      z-index: 100;
    }
    #menu-screen h1 {
      font-size: clamp(28px, 8vw, 64px);
      background: linear-gradient(135deg, #f5af19, #f12711, #f5af19);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s ease-in-out infinite;
      margin-bottom: 8px;
      text-shadow: none;
    }
    #menu-screen .subtitle {
      font-size: clamp(12px, 3vw, 18px);
      color: #888;
      margin-bottom: 40px;
    }
    .menu-btn {
      background: linear-gradient(135deg, #f5af19, #f12711);
      border: none;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 14px 48px;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(245,175,25,0.3);
    }
    .menu-btn:active {
      transform: scale(0.95);
      box-shadow: 0 2px 10px rgba(245,175,25,0.5);
    }
    .install-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: none;
      font-size: 14px;
      padding: 10px 32px;
      display: none;
    }
    .install-btn:active {
      box-shadow: 0 2px 10px rgba(255,255,255,0.2);
    }
    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    #level-announce {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #level-announce.show {
      opacity: 1;
      pointer-events: auto;
    }
    #level-announce h2 {
      font-size: clamp(24px, 7vw, 56px);
      color: #f5af19;
    }
    #level-announce p {
      font-size: 16px;
      color: #aaa;
      margin-top: 8px;
    }
    #game-over-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.9);
      z-index: 100;
    }
    #game-over-screen h2 {
      font-size: clamp(28px, 8vw, 56px);
      color: #f12711;
      margin-bottom: 12px;
    }
    #game-over-screen .score-display {
      font-size: 20px;
      color: #f5af19;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div id="menu-screen">
    <h1>BOULDER DASH</h1>
    <p class="subtitle">Hyper Animated Edition</p>
    <button class="menu-btn" id="btn-start">START</button>
    <button class="menu-btn install-btn" id="btn-install">INSTALL APP</button>
  </div>

  <canvas id="game-canvas"></canvas>

  <div id="ui-overlay">
    <div id="hud" style="display:none;">
      <div class="hud-item">
        <span class="hud-icon">💎</span>
        <span class="hud-value" id="hud-diamonds">0/0</span>
      </div>
      <div class="hud-item">
        <span class="hud-icon">⏱</span>
        <span class="hud-value" id="hud-time">0:00</span>
      </div>
      <div class="hud-item">
        <span class="hud-icon">🏆</span>
        <span class="hud-value" id="hud-score">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-icon">❤️</span>
        <span class="hud-value" id="hud-lives">3</span>
      </div>
    </div>

    <div id="dpad-container"></div>
    <div id="action-container"></div>
  </div>

  <div id="level-announce">
    <h2 id="level-announce-text">LEVEL 1</h2>
    <p id="level-announce-sub">Collect all diamonds!</p>
  </div>

  <div id="game-over-screen">
    <h2 id="gameover-title">GAME OVER</h2>
    <div class="score-display" id="gameover-score">Score: 0</div>
    <button class="menu-btn" id="btn-restart">PLAY AGAIN</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
